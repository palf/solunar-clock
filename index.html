<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Solunar Globe Clock</title>
<style>
  :root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.9);
    --border: rgba(56, 189, 248, 0.2);
    --accent: #38bdf8;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
  }
  
  * { box-sizing: border-box; }
  
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  /* Perfect Centering */
  body {
    display: grid;
    place-items: center;
  }

  /* Clock Container - Constrained to 5" portrait bounds */
  #stage {
    position: relative;
    width: 480px;
    height: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.03); /* Subtle guide */
  }

  /* The SVG Clock - Perfectly Centered square */
  svg {
    width: 460px; /* Slight margin for labels */
    height: 460px;
    background: transparent;
    z-index: 1;
  }

  /* HUD Styling */
  .hud {
    position: absolute;
    background: var(--panel);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 12px;
    pointer-events: none;
    z-index: 10;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #hud-top { top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
  #hud-bottom { bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-end; }

  .hud-group { display: flex; flex-direction: column; gap: 2px; }
  .hud-label { color: var(--accent); font-size: 9px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
  .hud-value { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
  
  #display-time { font-size: 18px; font-weight: 700; color: #fff; }

  /* Search Modal */
  #search-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    background: #1e293b;
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 20px;
    z-index: 100;
    display: none;
    box-shadow: 0 0 100px rgba(0,0,0,0.9);
  }

  input {
    width: 100%;
    background: #0f172a;
    border: 1px solid #334155;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: var(--accent); }

  #searchResults { margin-top: 12px; max-height: 200px; overflow-y: auto; font-size: 12px; }
  .search-item { padding: 10px; border-bottom: 1px solid #334155; cursor: pointer; }
  .search-item:hover { background: #334155; }

  /* Map Visuals */
  .slice { fill: rgba(56, 189, 248, 0.03); stroke: rgba(255,255,255,0.05); }
  .slice.alt { fill: rgba(56, 189, 248, 0.08); }
  .land { fill: #1e293b; stroke: #334155; stroke-width: 0.5px; }
  .coast { stroke: #475569; stroke-width: 0.5px; fill: none; }
  .label { fill: var(--text-dim); font-size: 10px; font-weight: 700; }
</style>
</head>
<body>
  <div id="stage">
    <!-- Top HUD: Time & Layer Status -->
    <div id="hud-top" class="hud">
      <div class="hud-group">
        <span class="hud-label">SOLUNAR UTC</span>
        <span id="display-time">00:00:00</span>
      </div>
      <div class="hud-group" style="text-align: right;">
        <span class="hud-label">LAYER</span>
        <span id="display-layer" style="color: #4ade80;">TERRAIN</span>
      </div>
    </div>

    <!-- The Clock -->
    <svg id="svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet">
      <title>Solunar Globe Clock</title>
    </svg>

    <!-- Bottom HUD: Coordinates & Zoom -->
    <div id="hud-bottom" class="hud">
      <div class="hud-group">
        <span class="hud-label">COORDINATES</span>
        <span id="display-pos">48.77° N, 8.06° E</span>
      </div>
      <div class="hud-group" style="text-align: right;">
        <span class="hud-label">ZOOM</span>
        <span id="display-zoom">1.0x</span>
      </div>
    </div>

    <!-- Search Modal -->
    <div id="search-overlay">
      <input type="text" id="locationSearch" placeholder="Enter city name..." autocomplete="off">
      <div id="searchResults"></div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <script type="module" src="src/globe-clock.ts"></script>
</body>
</html>
