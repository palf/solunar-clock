<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Solunar Globe Clock</title>
<style>
  :root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.85);
    --border: rgba(56, 189, 248, 0.2);
    --accent: #38bdf8;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
  }
  
  * { box-sizing: border-box; }
  
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @supports (height: 100dvh) {
    html, body { height: 100dvh; }
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
  }

  /* Map Canvases fill entire window */
  #map-canvas, #webgl-canvas {
    position: absolute;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
  }

  /* The 50% Opacity Mask with a clear hole in the center */
  #stage::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    /* 50% opacity background with a sharp hole in center */
    background: radial-gradient(circle 228px at 50% 50%, transparent 99%, rgba(2, 6, 23, 0.5) 100%);
    pointer-events: none;
    z-index: 2;
  }

  svg {
    width: 100%;
    height: 100%;
    max-width: 95vmin;
    max-height: 95vmin;
    background: transparent;
    z-index: 3;
  }

  /* HUD Styling */
  .hud {
    position: absolute;
    background: var(--panel);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 10px;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  #hud-top { top: env(safe-area-inset-top, 10px); left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
  #hud-bottom { bottom: env(safe-area-inset-bottom, 10px); left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; }

  .hud-group { display: flex; flex-direction: column; gap: 1px; }
  .hud-label { color: var(--accent); font-size: 8px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
  .hud-value { font-size: 11px; font-weight: 500; font-variant-numeric: tabular-nums; }
  
  #display-time { font-size: 14px; font-weight: 700; color: #fff; }

  /* Interactive HUD Triggers */
  .hud-btn {
    pointer-events: auto;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--accent);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 18px;
    transition: all 0.2s;
  }
  .hud-btn:hover { background: rgba(255,255,255,0.1); }

  #layer-trigger {
    pointer-events: auto;
    cursor: pointer;
    padding: 0 12px;
    border-radius: 8px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #layer-trigger:hover { background: rgba(255,255,255,0.1); }

  /* Layer Dropdown */
  #layer-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    background: #1e293b;
    border: 1px solid var(--accent);
    border-radius: 8px;
    display: none;
    flex-direction: column;
    min-width: 120px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    pointer-events: auto;
  }
  .layer-option {
    padding: 10px 15px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .layer-option:last-child { border-bottom: none; }
  .layer-option:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .layer-option.active { color: var(--accent); }

  /* Search/Zoom/Help Modals */
  .overlay-dialog {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1e293b;
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 15px;
    z-index: 100;
    display: none;
    box-shadow: 0 0 100px rgba(0,0,0,0.9);
  }

  input {
    width: 100%;
    background: #0f172a;
    border: 1px solid #334155;
    color: white;
    padding: 10px;
    border-radius: 6px;
    font-size: 16px;
    outline: none;
  }

  #searchResults { margin-top: 10px; max-height: 150px; overflow-y: auto; font-size: 12px; }
  .search-item { padding: 8px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.1s; }
  .search-item.selected { background: var(--accent); color: var(--bg); font-weight: 700; }

  .help-list { list-style: none; padding: 0; margin: 0; font-size: 11px; }
  .help-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .help-keys { display: flex; gap: 4px; align-items: center; }
  .help-key { background: #334155; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: 700; color: var(--accent); min-width: 20px; text-align: center; }

  /* Map Visuals */
  .slice { fill: rgba(56, 189, 248, 0.03); stroke: rgba(255,255,255,0.05); }
  .slice.alt { fill: rgba(56, 189, 248, 0.08); }
  .land { fill: #1e293b; stroke: #334155; stroke-width: 0.5px; }
  .coast { stroke: #475569; stroke-width: 0.5px; fill: none; }
  .label { fill: var(--text-dim); font-size: 10px; font-weight: 700; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="map-canvas" width="600" height="600"></canvas>
    <canvas id="webgl-canvas" width="600" height="600" style="display: none;"></canvas>
    
    <!-- Top HUD -->
    <div id="hud-top" class="hud">
      <!-- Left side: Clock -->
      <div class="hud-group" style="text-align: left;">
        <span class="hud-label">SOLUNAR UTC</span>
        <span id="display-time">00:00:00</span>
      </div>

      <!-- Right side: Controls -->
      <div style="display: flex; gap: 6px; align-items: center;">
        <button id="btn-help" class="hud-btn" title="Help / Shortcuts" type="button">?</button>
        <button id="btn-locate" class="hud-btn" title="Set/Go Home" type="button">🎯</button>
        <button id="btn-search" class="hud-btn" title="Search Location" type="button">🔍</button>
        
        <div style="position: relative;">
          <button id="layer-trigger" class="hud-btn" title="Change Map Layer" type="button">🗺️</button>
          <div id="layer-dropdown">
            <div class="layer-option active" data-layer="STREETS">STREETS</div>
            <div class="layer-option" data-layer="TOPOGRAPHIC">TOPOGRAPHIC</div>
            <div class="layer-option" data-layer="IMAGERY">IMAGERY</div>
          </div>
        </div>

        <button id="btn-mode" class="hud-btn" title="Toggle Render Mode" type="button" style="font-size: 10px; font-weight: 900;">3D</button>
      </div>
    </div>

    <svg id="svg" preserveAspectRatio="xMidYMid meet">
      <title>Solunar Globe Clock</title>
    </svg>

    <!-- Bottom HUD -->
    <div id="hud-bottom" class="hud">
      <div class="hud-group">
        <span class="hud-label">COORDINATES</span>
        <span id="display-pos">0.00° N, 0.00° E</span>
      </div>
      <div class="hud-group" style="text-align: right; pointer-events: auto; cursor: pointer;" id="group-zoom">
        <span class="hud-label">ZOOM</span>
        <span id="display-zoom">1.0x</span>
      </div>
    </div>

    <div id="search-overlay" class="overlay-dialog" style="width: 90%; max-width: 320px;">
      <input type="text" id="locationSearch" placeholder="Search city or postcode..." autocomplete="off">
      <div id="searchResults"></div>
    </div>

    <div id="zoom-overlay" class="overlay-dialog" style="width: 90%; max-width: 200px;">
      <span class="hud-label" style="display: block; margin-bottom: 8px;">Set Zoom Level</span>
      <input type="number" id="zoomInput" placeholder="3000" step="100" min="0.5">
    </div>

    <div id="help-overlay" class="overlay-dialog" style="width: 90%; max-width: 280px; color: #fff;">
      <span class="hud-label" style="display: block; margin-bottom: 12px; font-size: 10px;">Keyboard Shortcuts</span>
      <div class="help-list">
        <div class="help-item"><span>Pan Map</span> <div class="help-keys"><span class="help-key">Arrows</span></div></div>
        <div class="help-item"><span>Zoom In/Out</span> <div class="help-keys"><span class="help-key">+</span> <span class="help-key">-</span></div></div>
        <div class="help-item"><span>Search City</span> <div class="help-keys"><span class="help-key">s</span> <span class="help-key">/</span></div></div>
        <div class="help-item"><span>Set/Go Home</span> <div class="help-keys"><span class="help-key">h</span></div></div>
        <div class="help-item"><span>Manual Zoom</span> <div class="help-keys"><span class="help-key">z</span></div></div>
        <div class="help-item"><span>Cycle Layers</span> <div class="help-keys"><span class="help-key">l</span></div></div>
        <div class="help-item"><span>Reset Map</span> <div class="help-keys"><span class="help-key">0</span></div></div>
        <div class="help-item"><span>Help Dialog</span> <div class="help-keys"><span class="help-key">?</span></div></div>
        <div class="help-item"><span>Close Menus</span> <div class="help-keys"><span class="help-key">Esc</span></div></div>
      </div>
      <button class="hud-btn" type="button" style="width: 100%; margin-top: 15px; height: 30px; font-size: 12px;" onclick="document.getElementById('help-overlay').style.display='none'">Close</button>
    </div>

    <!-- Attribution -->
    <div id="display-attribution" style="position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: 7px; color: var(--text-dim); opacity: 0.6; pointer-events: none;"></div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <script type="module" src="src/globe-clock.ts"></script>
</body>
</html>
